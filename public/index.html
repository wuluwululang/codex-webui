<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#f7f7f4" />
    <title>Codex WebUI</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar">
        <div class="brand-row">
          <div>
            <div class="brand">Codex WebUI</div>
            <div class="connection" id="connection" data-i18n="connection.connecting">连接中</div>
          </div>
          <select class="theme-select" id="themeSelect" aria-label="主题" data-i18n-aria-label="theme.label">
            <option value="system" data-i18n="theme.system">跟随系统</option>
            <option value="light" data-i18n="theme.light">日间</option>
            <option value="dark" data-i18n="theme.dark">夜间</option>
          </select>
          <button class="icon-button mobile-only" id="closeSidebar" aria-label="关闭会话列表" data-i18n-aria-label="sidebar.close">×</button>
        </div>

        <button class="primary-action" id="newThread" data-i18n="thread.new">新会话</button>

        <label class="field-label" for="searchThreads" data-i18n="thread.search">搜索</label>
        <input class="field" id="searchThreads" placeholder="会话标题或内容" data-i18n-placeholder="thread.searchPlaceholder" />

        <div class="thread-list" id="threadList"></div>
      </aside>

      <main class="chat-pane">
        <header class="topbar">
          <button class="icon-button mobile-only" id="openSidebar" aria-label="打开会话列表" data-i18n-aria-label="sidebar.open">☰</button>
          <div class="thread-title-wrap">
            <div class="thread-title-line">
              <input class="thread-title" id="threadTitle" placeholder="未选择会话" data-i18n-placeholder="thread.notSelected" disabled />
              <button class="resume-status" id="resumeStatus" type="button" title="点击连接会话" data-i18n="thread.connect" data-i18n-title="thread.connectTitle">点击连接</button>
              <button class="icon-button fullscreen-toggle" id="fullscreenToggle" type="button" aria-label="切换全屏" title="切换全屏" data-i18n-aria-label="fullscreen.toggle" data-i18n-title="fullscreen.toggle">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path class="fullscreen-icon-enter" d="M8 3H3v5h2V5h3V3Zm8 0v2h3v3h2V3h-5ZM5 16H3v5h5v-2H5v-3Zm14 3h-3v2h5v-5h-2v3Z" />
                  <path class="fullscreen-icon-exit" d="M5 16h3v3h2v-5H5v2Zm3-8H5v2h5V5H8v3Zm6 11h2v-3h3v-2h-5v5Zm2-11V5h-2v5h5V8h-3Z" />
                </svg>
              </button>
            </div>
            <div class="thread-meta" id="threadMeta" data-i18n="common.ready">准备就绪</div>
          </div>
        </header>

        <section class="connection-banner hidden" id="connectionBanner" aria-live="polite"></section>

        <section class="auth-panel hidden" id="authPanel">
          <div>
            <strong data-i18n="auth.required">需要登录 Codex</strong>
            <p id="authText" data-i18n="auth.description">可以使用设备码完成登录。</p>
          </div>
          <button class="secondary-action" id="deviceLogin" data-i18n="auth.deviceLogin">设备码登录</button>
        </section>

        <section class="approval-panel hidden" id="approvalPanel"></section>
        <section class="messages" id="messages">
          <div class="empty-state">
            <h1 data-i18n="empty.chooseTitle">选择或创建一个会话</h1>
            <p data-i18n="empty.chooseDescription">手机和电脑在同一 Wi-Fi 下即可使用这个页面继续 Codex 对话。</p>
          </div>
        </section>

        <form class="composer" id="composer">
          <textarea id="promptInput" rows="1" placeholder="发消息给 Codex" data-i18n-placeholder="composer.placeholder"></textarea>
          <button class="send-button" id="sendButton" type="submit" data-i18n="composer.send">发送</button>
        </form>

        <section class="setup-band" id="setupBand">
          <div class="setup-grid">
            <label class="cwd-setting">
              <span data-i18n="settings.cwd">工作目录</span>
              <input id="cwdInput" class="field" readonly />
            </label>
            <label>
              <span data-i18n="settings.project">项目</span>
              <select id="projectSelect" class="field"></select>
            </label>
            <label>
              <span data-i18n="settings.model">模型</span>
              <select id="modelSelect" class="field"></select>
            </label>
            <label>
              <span data-i18n="settings.reasoning">推理强度</span>
              <select id="reasoningSelect" class="field">
                <option value="low" data-i18n="reasoning.low">轻度</option>
                <option value="medium" data-i18n="reasoning.medium">中</option>
                <option value="high" data-i18n="reasoning.high">高</option>
                <option value="xhigh" data-i18n="reasoning.xhigh">极高</option>
              </select>
            </label>
            <label>
              <span data-i18n="settings.approval">确认</span>
              <select id="approvalSelect" class="field">
                <option value="on-request" data-i18n="approval.onRequest">需要时询问</option>
                <option value="on-failure" data-i18n="approval.onFailure">失败时再问</option>
                <option value="never" data-i18n="approval.never">不询问</option>
              </select>
            </label>
            <label>
              <span data-i18n="settings.sandbox">沙盒</span>
              <select id="sandboxSelect" class="field">
                <option value="workspace-write" data-i18n="sandbox.workspaceWrite">项目内可写</option>
                <option value="read-only" data-i18n="sandbox.readOnly">只读</option>
                <option value="danger-full-access" data-i18n="sandbox.fullAccess">完全访问</option>
              </select>
            </label>
          </div>
        </section>
      </main>
    </div>

    <div class="image-viewer hidden" id="imageViewer" role="dialog" aria-modal="true">
      <button class="image-viewer-backdrop" id="imageViewerBackdrop" type="button" aria-label="Close image preview" data-i18n-aria-label="viewer.close"></button>
      <img id="imageViewerImg" alt="" />
      <button class="image-viewer-close" id="imageViewerClose" type="button" aria-label="Close image preview" data-i18n-aria-label="viewer.close">x</button>
    </div>

    <script src="/vendor/markdown-it.min.js"></script>
    <script src="/vendor/purify.min.js"></script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
